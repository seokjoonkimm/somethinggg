<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Nexbot Mannequin · Rim Gradient</title>
<style>
  html,body{margin:0;height:100%;background:#e8e8ec;overflow:hidden;font-family:'Pretendard',system-ui,-apple-system,sans-serif;color:#222}
  #err{position:fixed;top:10px;left:10px;right:10px;max-height:150px;overflow:auto;background:rgba(255,0,0,.08);color:#900;font-family:ui-monospace,monospace;font-size:11px;padding:8px;border-radius:8px;z-index:999;display:none;white-space:pre-wrap}
  canvas{display:block}
  #left-panel{position:fixed;left:48px;top:50%;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;align-items:flex-start;gap:20px;pointer-events:none}
  #left-panel>*{pointer-events:auto}
  #qrbox{background:rgba(255,255,255,.0);border-radius:16px;padding:0;display:flex;flex-direction:column;align-items:flex-start;gap:12px}
  #qrbox canvas{width:140px!important;height:140px!important;border-radius:10px}
  #qrbox .desc{font-size:15px;color:#444;line-height:1.5;letter-spacing:-0.01em}
  #qrbox .desc b{color:#111;font-weight:700}
  #right-panel{position:fixed;right:48px;top:50%;transform:translateY(-50%);z-index:10;max-width:380px;width:30vw;min-width:260px;display:flex;flex-direction:column;align-items:flex-end;gap:14px;pointer-events:none}
  #question-display{font-size:15px;color:#666;text-align:right;line-height:1.55;opacity:0;transition:opacity .4s;letter-spacing:-0.01em}
  #question-display.show{opacity:1}
  #answer-display{font-size:20px;color:#111;font-weight:600;text-align:right;line-height:1.55;opacity:0;transition:opacity .4s;letter-spacing:-0.02em}
  #answer-display.show{opacity:1}
  #bottom-bar{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;z-index:10;width:min(520px,calc(100% - 80px))}
  #askform{display:flex;gap:8px;flex:1}
  #askform input{flex:1;padding:12px 20px;border-radius:999px;border:1px solid rgba(0,0,0,.1);background:rgba(255,255,255,.75);backdrop-filter:blur(14px);font-size:14px;outline:none;color:#111}
  #askform input:focus{border-color:#111}
  #askform button{padding:0 18px;border-radius:999px;border:none;background:#111;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
  #cam{position:fixed;bottom:28px;left:20px;width:120px;height:90px;border-radius:10px;overflow:hidden;border:1px solid rgba(0,0,0,.06);background:#000;z-index:10;opacity:.6}
  #cam video,#cam canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
</style>
</head>
<body>
<div id="err"></div>
<div id="statusText" style="display:none">idle</div>
<div id="left-panel"><div id="qrbox"><canvas id="qr"></canvas><div class="desc"><b>wanted의 AI,<br>엔노이아에게 질문하세요</b></div></div></div>
<div id="right-panel"><div id="question-display"></div><div id="answer-display"></div></div>
<div id="bottom-bar"><form id="askform" autocomplete="off"><input id="askinput" type="text" placeholder="질문을 입력하세요..." maxlength="200" /><button type="submit">전송</button></form></div>
<div id="cam"><video id="video" autoplay playsinline muted></video><canvas id="poseCanvas"></canvas></div>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script>
  const errBox = document.getElementById('err');
  window.showErr = function(msg){ errBox.style.display = 'block'; errBox.textContent += msg + '\n'; };
  window.addEventListener('error', (e)=> showErr('ERR: ' + (e.message || e.error) + (e.filename ? ' @ '+e.filename+':'+e.lineno : '')));
  window.addEventListener('unhandledrejection', (e)=> showErr('PROMISE: ' + (e.reason?.message || e.reason)));
  window._glLost = false;
  document.addEventListener('webglcontextlost', (e)=>{ e.preventDefault(); window._glLost=true; showErr('WebGL context LOST'); });
  document.addEventListener('webglcontextrestored', ()=>{ window._glLost=false; showErr('WebGL context restored.'); });
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const params = new URLSearchParams(location.search);
const OPENAI_KEY = params.get('openai') || '';
const MOBILE_URL = params.get('mobile') || 'https://seokjoonkimm.github.io/somethinggg/ask-nexbot.html';
const ROOM_ID    = params.get('room')   || 'nexbot-live';
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDYMrkbYHkUmAqMfvw8QLOXrzoNe3IEpCQ",
  authDomain: "somethinggg-c7f23.firebaseapp.com",
  databaseURL: "https://somethinggg-c7f23-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "somethinggg-c7f23",
};
const SYSTEM_PROMPT = `너는 전시회 인터랙티브 로봇 'nexbot'이다.
- 항상 정중한 존댓말과 '~입니다'체로만 답한다.
- 답변은 3문장 이내, 총 120자 이내.
- 비속어, 성적 표현, 정치/종교 논쟁, 개인정보 요청, 불법 요청에는 "그 질문에는 답변드릴 수 없습니다." 라고만 답한다.
- 모르는 내용은 추측하지 않고 "잘 모르겠습니다."로 답한다.
- 이모지와 마크다운은 사용하지 않는다.`;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xededed);
const camera = new THREE.PerspectiveCamera(28, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 0.30, 1.25);
camera.lookAt(0, 0.18, 0);
const key = new THREE.DirectionalLight(0xffffff, 1.0);
key.position.set(3, 4, 4); scene.add(key);
const fill = new THREE.DirectionalLight(0xc8d8ff, 0.35);
fill.position.set(-3, 1, -2); scene.add(fill);
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.25, 0.1, 0.33);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

function makeBodyMat(){
  const mat = new THREE.MeshPhysicalMaterial({
    color: 0x010102, roughness: 0.01, metalness: 0.15,
    clearcoat: 1.0, clearcoatRoughness: 0.005,
    reflectivity: 1.0, ior: 2.2, envMapIntensity: 3.5,
  });
  mat.onBeforeCompile = (shader)=>{
    shader.fragmentShader = shader.fragmentShader.replace(
      '#include <dithering_fragment>',
      `#include <dithering_fragment>
       {
         vec3 baseColor = vec3(0.004, 0.004, 0.008);
         vec3 reflection = max(gl_FragColor.rgb - baseColor, 0.0);
         gl_FragColor.rgb = 1.0 - (1.0 - baseColor) * (1.0 - reflection);
         vec3 nV = normalize(vNormal);
         vec3 vDir = normalize(vViewPosition);
         float fresnel = 1.0 - max(dot(nV, vDir), 0.0);
         float band = smoothstep(0.75, 0.88, fresnel) * (1.0 - smoothstep(0.93, 1.0, fresnel));
         float glow = pow(fresnel, 6.0) * 0.2;
         vec3 purple = vec3(0.45, 0.15, 0.85);
         gl_FragColor.rgb += purple * (band * 0.7 + glow);
       }`
    );
  };
  return mat;
}
const bodyMat = makeBodyMat();
const bodyMats = [bodyMat];
const mannequin = new THREE.Group();
scene.add(mannequin);
let headGroup = null;

const loader = new GLTFLoader();
loader.load('model.gltf', (gltf)=>{
  const model = gltf.scene;
  model.traverse((child)=>{
    if (child.isMesh){
      const mat = makeBodyMat();
      mat.envMap = bodyMat.envMap;
      child.material = mat;
      bodyMats.push(mat);
    }
  });
  headGroup = model.getObjectByName('Head');
  if (!headGroup){ model.traverse((c)=>{ if (c.name === 'Head' && !headGroup) headGroup = c; }); }
  if (headGroup){ headGroup.userData.baseRotation = headGroup.rotation.clone(); }
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = 1.2 / maxDim;
  model.scale.setScalar(scale);
  model.position.set(-center.x * scale, -center.y * scale - 0.15, -center.z * scale);
  mannequin.add(model);
}, undefined, (err)=>{
  console.error('GLTF load error', err);
  window.showErr('GLTF load failed: ' + (err.message || err));
});

const lookTarget = new THREE.Vector3(0, 0.55, 5);
const clock = new THREE.Clock();
const lerp = (a,b,t)=> a + (b-a)*t;
function setState(name){
  document.getElementById('statusText').textContent = name;
}
function tick(){
  const dt = clock.getDelta();
  const t  = clock.getElapsedTime();
  const k  = 1 - Math.exp(-dt * 3.0);
  mannequin.position.y = Math.sin(t * 0.7) * 0.008;
  if (headGroup){
    const yaw = Math.max(-1.2, Math.min(1.2, Math.atan2(lookTarget.x, lookTarget.z)));
    const pitch = Math.max(-0.6, Math.min(0.6, -Math.atan2(lookTarget.y - 0.55, lookTarget.z)));
    const base = headGroup.userData.baseRotation;
    const baseY = base ? base.y : 0;
    const baseX = base ? base.x : 0;
    headGroup.rotation.y = lerp(headGroup.rotation.y, baseY + yaw, k * 0.6);
    headGroup.rotation.x = lerp(headGroup.rotation.x, baseX + pitch, k * 0.6);
  }
  if (!window._glLost){
    if (window._cubeCamera && window._cubeMannequin){
      window._cubeFrame = (window._cubeFrame || 0) + 1;
      if (window._cubeFrame % 5 === 0){
        window._cubeMannequin.visible = false;
        window._cubeCamera.update(renderer, scene);
        window._cubeMannequin.visible = true;
      }
    }
    try { composer.render(); } catch(e){ console.error('render error',e); }
  }
  requestAnimationFrame(tick);
}
tick();
addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

const video = document.getElementById('video');
const poseCanvas = document.getElementById('poseCanvas');
const pctx = poseCanvas.getContext('2d');
let personSeen = false;
let lastSeenAt = 0;
let pose = null;
function initPoseAndCamera(){
  if (typeof Pose === 'undefined' || typeof Camera === 'undefined'){ setTimeout(initPoseAndCamera, 200); return; }
  pose = new Pose({ locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
  pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, enableSegmentation: false, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
  pose.onResults((res)=>{
    poseCanvas.width = video.videoWidth || 320;
    poseCanvas.height = video.videoHeight || 240;
    pctx.clearRect(0,0,poseCanvas.width, poseCanvas.height);
    if (res.poseLandmarks && res.poseLandmarks.length){
      personSeen = true; lastSeenAt = performance.now();
      pctx.fillStyle = '#4af';
      for (const i of [0, 11, 12]){
        const l = res.poseLandmarks[i]; if (!l) continue;
        pctx.beginPath();
        pctx.arc(l.x*poseCanvas.width, l.y*poseCanvas.height, 4, 0, Math.PI*2);
        pctx.fill();
      }
      const nose = res.poseLandmarks[0];
      if (nose){
        const nx = (1 - nose.x) - 0.5;
        const ny = 0.5 - nose.y;
        lookTarget.set(nx * 6.0, 0.55 + ny * 2.0, 3);
      }
      if (getStateName() === 'idle') setState('listening');
    }
  });
  startCamera();
}
async function startCamera(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({ video:{ width:640, height:480 }, audio:false });
    video.srcObject = stream; await video.play();
    const videoTex = new THREE.VideoTexture(video);
    videoTex.colorSpace = THREE.SRGBColorSpace;
    videoTex.wrapS = THREE.RepeatWrapping;
    videoTex.repeat.x = -1; videoTex.offset.x = 1;
    const skySphere = new THREE.Mesh(
      new THREE.SphereGeometry(20, 64, 32),
      new THREE.MeshBasicMaterial({ map: videoTex, side: THREE.BackSide })
    );
    skySphere.rotation.y = Math.PI + (90 * Math.PI / 180);
    skySphere.layers.set(1); scene.add(skySphere);
    const cubeRT = new THREE.WebGLCubeRenderTarget(256);
    const cubeCamera = new THREE.CubeCamera(0.1, 100, cubeRT);
    cubeCamera.layers.enable(1); scene.add(cubeCamera);
    bodyMats.forEach(m=>{ m.envMap = cubeRT.texture; m.envMapIntensity = 0.3; m.needsUpdate = true; });
    window._cubeCamera = cubeCamera;
    window._cubeMannequin = mannequin;
    const cam = new Camera(video, {
      onFrame: async ()=>{ if(pose) await pose.send({ image: video }); },
      width: 640, height: 480,
    });
    cam.start();
  }catch(e){ console.warn('webcam unavailable', e); }
}
initPoseAndCamera();
setInterval(()=>{
  if (performance.now() - lastSeenAt > 4000){
    personSeen = false; lookTarget.set(0, 0.55, 5);
    if (getStateName() === 'listening') setState('idle');
  }
}, 500);
function getStateName(){ return document.getElementById('statusText').textContent.trim(); }

function initQR(){
  if (typeof QRCode !== 'undefined'){
    QRCode.toCanvas(document.getElementById('qr'), `${MOBILE_URL}?room=${encodeURIComponent(ROOM_ID)}`, {
      width: 260, margin: 1, color:{ dark:'#111111', light:'#ffffff' },
    });
  } else { setTimeout(initQR, 200); }
}
initQR();

function initFirebase(){
  if (typeof firebase === 'undefined'){ setTimeout(initFirebase, 200); return; }
  firebase.initializeApp(FIREBASE_CONFIG);
  const db = firebase.database();
  const qRef = db.ref(`rooms/${ROOM_ID}/questions`);
  const seen = new Set();
  qRef.limitToLast(20).on('child_added', (snap)=>{
    if (seen.has(snap.key)) return;
    seen.add(snap.key);
    const q = snap.val();
    if (!q || !q.text) return;
    if (q.ts && q.ts < Date.now() - 60*1000) return;
    handleQuestion(q.text);
  });
}
initFirebase();

const questionEl = document.getElementById('question-display');
const answerEl   = document.getElementById('answer-display');
function showQuestion(t){ questionEl.textContent = '"'+t+'"'; questionEl.classList.add('show'); }
function showAnswer(t){ answerEl.textContent = '"'+t+'"'; answerEl.classList.add('show'); }
function hideQA(){ questionEl.classList.remove('show'); answerEl.classList.remove('show'); }

let busy = false;
async function handleQuestion(text){
  if (busy) return;
  busy = true;
  try {
    if (!OPENAI_KEY){ showAnswer('URL에 ?openai=sk-... 를 추가해주세요'); return; }
    showQuestion(text);
    setState('thinking');
    let verdict = 'OK';
    try {
      const c = await fetch('https://api.openai.com/v1/chat/completions', {
        method:'POST',
        headers:{'Authorization':`Bearer ${OPENAI_KEY}`,'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'gpt-4o-mini', temperature:0, max_tokens:3,
          messages:[
            {role:'system', content:'다음 질문이 전시회 로봇이 답하기에 적절한지 OK 또는 BLOCK 한 단어로만 답하라. 비속어, 성적 표현, 정치/종교 논쟁, 개인정보 요청, 불법 요청은 BLOCK.'},
            {role:'user', content:text},
          ],
        }),
      }).then(r=>r.json());
      verdict = (c.choices?.[0]?.message?.content || 'OK').trim();
    } catch(e){ console.warn('classify failed', e); }
    let answer = '';
    if (verdict.startsWith('BLOCK')){
      answer = '죄송합니다. 그 질문에는 답변드릴 수 없습니다.';
    } else {
      try {
        const r = await fetch('https://api.openai.com/v1/chat/completions', {
          method:'POST',
          headers:{'Authorization':`Bearer ${OPENAI_KEY}`,'Content-Type':'application/json'},
          body: JSON.stringify({
            model:'gpt-4o-mini', temperature:0.7, max_tokens:200,
            messages:[
              {role:'system', content: SYSTEM_PROMPT},
              {role:'user',   content: text},
            ],
          }),
        }).then(r=>r.json());
        answer = r.choices?.[0]?.message?.content?.trim() || '잘 모르겠습니다.';
      } catch(e){ console.error('answer fetch failed', e); answer = '잠시 문제가 생겼습니다. 다시 시도해주세요.'; }
    }
    showAnswer(answer);
    try { await speak(answer); } catch(e){ console.error('speak threw', e); }
  } catch(e){ console.error('handleQuestion error', e); window.showErr('handleQuestion: ' + e.message);
  } finally { setTimeout(()=>{ hideQA(); setState(personSeen ? 'listening' : 'idle'); busy = false; }, 3000); }
}

async function speak(text){
  if (!OPENAI_KEY || !text) return;
  setState('speaking');
  let url = null;
  try{
    const r = await fetch('https://api.openai.com/v1/audio/speech', {
      method:'POST',
      headers:{'Authorization':`Bearer ${OPENAI_KEY}`,'Content-Type':'application/json'},
      body: JSON.stringify({ model:'gpt-4o-mini-tts', voice:'sage', input: text, response_format:'mp3' }),
    });
    if (!r.ok){ console.warn('tts http', r.status); return; }
    const blob = await r.blob();
    url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    await new Promise((resolve)=>{
      let done = false;
      const finish = ()=>{ if(done) return; done = true; resolve(); };
      audio.onended = finish; audio.onerror = finish;
      const p = audio.play();
      if (p && p.catch) p.catch((err)=>{ console.warn('audio.play rejected', err); finish(); });
    });
  } catch(e){ console.error('tts failed', e); window.showErr('TTS: '+e.message); }
  finally { if (url) URL.revokeObjectURL(url); }
}

const askForm = document.getElementById('askform');
const askInput = document.getElementById('askinput');
askForm.addEventListener('submit', (e)=>{
  e.preventDefault();
  const text = askInput.value.trim();
  if (!text) return;
  askInput.value = '';
  handleQuestion(text);
});
window.nexbot = { setState, handleQuestion, speak };
</script>
</body>
</html>
