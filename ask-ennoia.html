<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>엔노이아에게 질문하기</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;height:-webkit-fill-available;overflow:hidden}
  body{min-height:100dvh;min-height:-webkit-fill-available;font-family:'Pretendard',system-ui,-apple-system,sans-serif;background:#fff;color:#222;overflow:hidden;touch-action:manipulation;
    padding:0;margin:0;
    opacity:0;filter:blur(20px);animation:page-enter 1.0s ease forwards}
  @keyframes page-enter{to{opacity:1;filter:blur(0)}}

  /* ── Intro title overlay ── */
  .intro-title{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;gap:6px}
  .intro-line{font-size:clamp(26px,7.5vw,36px);font-weight:700;letter-spacing:-.04em;color:rgba(34,34,34,.85);text-align:center;opacity:0;filter:blur(8px);translate:0 12px}
  .intro-line.show{opacity:1;filter:blur(0);translate:0 0;transition:opacity .6s ease,filter .6s ease,translate .6s ease}
  .intro-line.hide{opacity:0;filter:blur(8px);translate:0 -12px;transition:opacity .5s ease,filter .5s ease,translate .5s ease}

  /* ── UI stagger (인트로 끝난 후) ── */
  .guide-label{opacity:0;translate:0 12px}
  .example-area{opacity:0;translate:0 12px}
  .cta-area{opacity:0;translate:0 12px}
  .guide-label.show,.example-area.show,.cta-area.show{opacity:1;translate:0 0;transition:opacity 1s ease,translate 1s ease}
  .cta-btn .cta-mask{position:absolute;inset:0;border-radius:9999px;background:#fff;opacity:1;transition:opacity 4s ease;pointer-events:none;z-index:1}
  .cta-area.show .cta-btn .cta-mask{opacity:0}
  @keyframes intro-up{to{opacity:1;transform:translateY(0)}}

  /* ── Layout ── */
  .container{display:flex;flex-direction:column;height:100%;height:100dvh;height:-webkit-fill-available;padding:env(safe-area-inset-top,0px) 24px env(safe-area-inset-bottom,0px);transition:opacity .7s ease,filter .7s ease;position:relative;z-index:10}
  body.compose .container{opacity:0;filter:blur(20px);pointer-events:none}

  /* ── CTA button — Liquid Glass ── */
  .cta-area{position:fixed;bottom:env(safe-area-inset-bottom,0px);left:0;right:0;padding:0 40px 24px;display:flex;justify-content:center;z-index:70;transition:opacity 1.2s ease,filter .5s ease}
  body.compose .cta-area{opacity:0;filter:blur(20px);pointer-events:none}
  .cta-btn{
    display:block;text-align:center;
    position:relative;width:100%;padding:20px 0;border-radius:9999px;border:none;
    background:rgba(255,255,255,.08);
    backdrop-filter:none;
    -webkit-backdrop-filter:none;
    color:rgba(0,0,0,.7);font-family:inherit;font-size:16px;font-weight:700;
    letter-spacing:-.02em;cursor:pointer;transition:all .3s;
    box-shadow:0 2px 12px rgba(0,0,0,.06),0 8px 32px rgba(0,0,0,.04);overflow:hidden;
  }
  .cta-btn::before{
    content:'';position:absolute;inset:0;border-radius:9999px;pointer-events:none;
    background:radial-gradient(ellipse 70% 60% at 50% 50%,transparent 0%,transparent 45%,rgba(255,255,255,.12) 65%,rgba(255,255,255,.25) 80%,rgba(255,255,255,.35) 100%),
    linear-gradient(180deg,rgba(255,255,255,.25) 0%,rgba(255,255,255,.08) 30%,transparent 55%);
  }
  .cta-btn::after{
    content:'';position:absolute;inset:0;border-radius:9999px;pointer-events:none;
    border:1.5px solid rgba(255,255,255,.27);
    box-shadow:inset 0 1px 3px rgba(255,255,255,.3),inset 0 -1px 2px rgba(0,0,0,.03),inset 2px 0 4px rgba(255,255,255,.07),inset -2px 0 4px rgba(255,255,255,.07),0 0 8px rgba(255,255,255,.15);
  }
  .cta-btn:active{transform:scale(.97)}

  /* ── Guide text ── */
  .text-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;gap:22px;padding-bottom:44px}
  .guide-label{font-size:clamp(14px, 4vw, 17px);font-weight:600;letter-spacing:-.02em;color:rgba(34,34,34,.4);text-align:center}

  /* ── Rolling questions ── */
  .example-area{position:relative;width:88%;min-height:140px;display:flex;align-items:flex-start;justify-content:center}
  .txt-slide{position:absolute;top:0;font-size:clamp(24px, 7vw, 34px);font-weight:700;line-height:1.35;letter-spacing:-.04em;white-space:pre-line;text-align:center;width:100%;opacity:0;translate:0 12px;transition:opacity 0.5s ease,translate 0.5s ease;word-break:keep-all;overflow-wrap:break-word}
  .txt-slide.active{opacity:1;translate:0 0}
  .txt-slide.exit{opacity:0;translate:0 -12px}
  .txt-slide .txt-base{color:rgba(34,34,34,.85)}
  .txt-slide .txt-glow{
    position:absolute;top:0;left:0;width:100%;white-space:pre-line;text-align:center;
    opacity:0;transition:opacity 2s ease;color:transparent;-webkit-text-fill-color:transparent;
  }
  .txt-slide.glow .txt-glow{opacity:.45}
  .txt-slide:nth-child(1) .txt-glow{background-image:conic-gradient(from 0deg at 50% 50%,#FF5C00,#FF8EFF,#00ADFF,#8364FF,#FF5C00);background-size:150% 150%;-webkit-background-clip:text;background-clip:text;animation:gflow 8s linear infinite;-webkit-mask-image:radial-gradient(ellipse 75% 75% at 50% 50%,transparent 0%,transparent 40%,#000 70%);mask-image:radial-gradient(ellipse 75% 75% at 50% 50%,transparent 0%,transparent 40%,#000 70%)}
  .txt-slide:nth-child(2) .txt-glow{background-image:conic-gradient(from 72deg at 50% 50%,#00ADFF,#8364FF,#FF5C00,#FF8EFF,#00ADFF);background-size:150% 150%;-webkit-background-clip:text;background-clip:text;animation:gflow 8s linear infinite;-webkit-mask-image:radial-gradient(ellipse 75% 75% at 50% 50%,transparent 0%,transparent 40%,#000 70%);mask-image:radial-gradient(ellipse 75% 75% at 50% 50%,transparent 0%,transparent 40%,#000 70%)}
  .txt-slide:nth-child(3) .txt-glow{background-image:conic-gradient(from 144deg at 50% 50%,#8364FF,#FF5C00,#FF8EFF,#00ADFF,#8364FF);background-size:150% 150%;-webkit-background-clip:text;background-clip:text;animation:gflow 8s linear infinite;-webkit-mask-image:radial-gradient(ellipse 75% 75% at 50% 50%,transparent 0%,transparent 40%,#000 70%);mask-image:radial-gradient(ellipse 75% 75% at 50% 50%,transparent 0%,transparent 40%,#000 70%)}
  .txt-slide:nth-child(4) .txt-glow{background-image:conic-gradient(from 216deg at 50% 50%,#FF8EFF,#00ADFF,#8364FF,#FF5C00,#FF8EFF);background-size:150% 150%;-webkit-background-clip:text;background-clip:text;animation:gflow 8s linear infinite;-webkit-mask-image:radial-gradient(ellipse 75% 75% at 50% 50%,transparent 0%,transparent 40%,#000 70%);mask-image:radial-gradient(ellipse 75% 75% at 50% 50%,transparent 0%,transparent 40%,#000 70%)}
  .txt-slide:nth-child(5) .txt-glow{background-image:conic-gradient(from 288deg at 50% 50%,#FF5C00,#00ADFF,#FF8EFF,#8364FF,#FF5C00);background-size:150% 150%;-webkit-background-clip:text;background-clip:text;animation:gflow 8s linear infinite;-webkit-mask-image:radial-gradient(ellipse 75% 75% at 50% 50%,transparent 0%,transparent 40%,#000 70%);mask-image:radial-gradient(ellipse 75% 75% at 50% 50%,transparent 0%,transparent 40%,#000 70%)}
  @keyframes gflow{0%{background-position:0% 50%}25%{background-position:100% 25%}50%{background-position:100% 50%}75%{background-position:0% 75%}100%{background-position:0% 50%}}

  /* ── Canvas / Bloom / White orb layers ── */
  #cubeCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;transition:opacity .8s ease;opacity:0;animation:canvas-in 2.5s ease forwards}
  @keyframes canvas-in{0%{opacity:0}40%{opacity:1}100%{opacity:1}}
  body.compose #cubeCanvas{opacity:.35}

  #bloomLayer{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;
    background:transparent;backdrop-filter:blur(35px) saturate(1.3) brightness(1.1);-webkit-backdrop-filter:blur(35px) saturate(1.3) brightness(1.1);
    opacity:0;animation:bloom-in 2s ease 1.0s forwards}
  @keyframes bloom-in{to{opacity:1}}

  #whiteOrb{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.6);width:160vw;height:320vw;border-radius:50%;pointer-events:none;z-index:5;
    background:radial-gradient(circle,rgba(255,255,255,1) 0%,rgba(255,255,255,.91) 25%,rgba(255,255,255,.5) 50%,rgba(255,255,255,0) 70%);
    opacity:0;animation:wh-orb-in 2s cubic-bezier(.25,.1,.25,1) 1.5s forwards}
  @keyframes wh-orb-in{0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
  @keyframes wh-breathe{0%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.12)}100%{transform:translate(-50%,-50%) scale(1)}}

  /* ── Compose overlay ── */
  .compose-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:env(safe-area-inset-top,0px) 24px env(safe-area-inset-bottom,0px);opacity:0;pointer-events:none;transition:opacity .7s ease,height .3s ease}
  body.compose .compose-overlay{opacity:1;pointer-events:auto}

  .typing-display{font-size:clamp(24px, 7vw, 34px);font-weight:700;line-height:1.5;letter-spacing:-.04em;text-align:center;width:85%;min-height:60px;position:relative;word-break:keep-all;overflow-wrap:break-word;color:rgba(34,34,34,.85);margin-top:30px}
  .typing-display .char{display:inline;color:rgba(34,34,34,.85)}
  @keyframes type-pulse{0%{color:rgba(131,100,255,.7)}100%{color:rgba(34,34,34,.85)}}
  .typing-display .cursor{display:inline-block;width:1.5px;height:1em;background:rgba(131,100,255,.5);margin-left:2px;animation:cursor-blink 1.2s ease-in-out infinite;vertical-align:text-bottom}
  @keyframes cursor-blink{0%,100%{opacity:.3}50%{opacity:.8}}

  /* Hidden textarea — always offscreen visually, but never display:none (kills focus on iOS) */
  .hidden-input{position:fixed;top:0;left:0;width:100%;height:100%;opacity:0.01;border:none;outline:none;background:transparent;font-size:16px;z-index:61;color:transparent;caret-color:transparent;-webkit-appearance:none;-webkit-user-select:text;user-select:text;padding:40% 20% 0;text-align:center}
  body:not(.compose) .hidden-input{pointer-events:none;z-index:-1}

  /* ── Back button ── */
  .back-btn{position:fixed;top:calc(env(safe-area-inset-top) + 12px);left:calc(env(safe-area-inset-left) + 16px);z-index:80;width:44px;height:44px;border:none;background:none;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .5s ease;display:flex;align-items:center;justify-content:center}
  body.compose .back-btn{opacity:1;pointer-events:auto}
  .back-btn svg{width:24px;height:24px;stroke:rgba(0,0,0,.4);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .back-btn:active{transform:scale(.9)}

  /* ── Form wrapper ── */
  #sendForm{position:fixed;top:0;left:0;width:0;height:0;overflow:visible;margin:0;padding:0;border:none}


  /* ── Toast ── */
  .sent-toast{width:85%;min-height:80px;opacity:0;pointer-events:none;z-index:100;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;transition:opacity .8s ease,translate .8s ease;translate:0 12px}
  .sent-toast.show{opacity:1;translate:0 0}
  .sent-toast.exit{opacity:0;translate:0 -12px}
  .sent-toast .toast-main{position:relative;font-size:clamp(24px, 7vw, 34px);font-weight:700;line-height:1.2;letter-spacing:-.04em;white-space:pre-line;word-break:keep-all;overflow-wrap:break-word;color:rgba(34,34,34,.85)}
  .sent-toast .toast-glow{position:absolute;top:0;left:0;width:100%;white-space:pre-line;text-align:center;color:transparent;-webkit-text-fill-color:transparent;background-image:conic-gradient(from 0deg at 50% 50%,#FF5C00,#FF8EFF,#00ADFF,#8364FF,#FF5C00);background-size:150% 150%;-webkit-background-clip:text;background-clip:text;animation:gflow 8s linear infinite;-webkit-mask-image:radial-gradient(ellipse 75% 75% at 50% 50%,transparent 0%,transparent 40%,#000 70%);mask-image:radial-gradient(ellipse 75% 75% at 50% 50%,transparent 0%,transparent 40%,#000 70%);opacity:.45;pointer-events:none}
  .sent-toast .toast-sub{font-size:clamp(14px, 4vw, 17px);font-weight:600;line-height:1.2;letter-spacing:-.02em;color:rgba(34,34,34,.4)}
</style>
</head>
<body>

<canvas id="cubeCanvas"></canvas>
<div id="bloomLayer"></div>
<div id="whiteOrb"></div>

<div class="intro-title" id="introTitle">
  <div class="intro-line" id="introL1">엔노이아에게</div>
  <div class="intro-line" id="introL2">질문해 보세요</div>
</div>

<div class="container">
  <div class="text-area">
    <div class="guide-label">엔노이아에게 질문해 보세요</div>
    <div class="example-area">
      <div class="txt-slide active"><span class="txt-base">사람은 AI에게
대체될 수 있을까?</span><div class="txt-glow">사람은 AI에게
대체될 수 있을까?</div></div>
      <div class="txt-slide"><span class="txt-base">하이파이브 26의
주제는 뭐야?</span><div class="txt-glow">하이파이브 26의
주제는 뭐야?</div></div>
      <div class="txt-slide"><span class="txt-base">원티드랩의
AX 문화가 궁금해</span><div class="txt-glow">원티드랩의
AX 문화가 궁금해</div></div>
      <div class="txt-slide"><span class="txt-base">3년 차 브랜드 디자이너
이직 꿀팁은?</span><div class="txt-glow">3년 차 브랜드 디자이너
이직 꿀팁은?</div></div>
      <div class="txt-slide"><span class="txt-base">엔노이아는
무슨 뜻이야?</span><div class="txt-glow">엔노이아는
무슨 뜻이야?</div></div>
    </div>
  </div>
  <div class="cta-area">
    <label class="cta-btn" id="ctaBtn" for="hiddenInput"><div class="cta-mask"></div><span style="position:relative;z-index:2">엔노이아에게 질문하기</span></label>
  </div>
</div>

<button class="back-btn" id="cancelBtn"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>

<div class="compose-overlay">
  <div class="typing-display" id="typingDisplay"><span class="cursor"></span></div>
  <div class="sent-toast" id="sentToast"></div>
  <form id="sendForm" action="javascript:void(0)"><input class="hidden-input" id="hiddenInput" type="text" maxlength="200" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="off" enterkeyhint="send"></form>
</div>


<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
/* ── Firebase ── */
const ROOM_ID = new URLSearchParams(location.search).get('room') || 'nexbot-live';
firebase.initializeApp({
  apiKey:"AIzaSyDYMrkbYHkUmAqMfvw8QLOXrzoNe3IEpCQ",
  authDomain:"somethinggg-c7f23.firebaseapp.com",
  databaseURL:"https://somethinggg-c7f23-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"somethinggg-c7f23"
});
const qRef = firebase.database().ref(`rooms/${ROOM_ID}/questions`);

/* ── DOM ── */
const hiddenInput = document.getElementById('hiddenInput');
const typingDisplay = document.getElementById('typingDisplay');
const cancelBtn = document.getElementById('cancelBtn');
const sentToast = document.getElementById('sentToast');
const overlay = document.querySelector('.compose-overlay');

let isComposing = false;
let prevLen = 0;
let sendLock = false;
let compositionJustEnded = false;

/* ── Helper: 입력 클리어 ── */
function clearInput(keepFocus) {
  hiddenInput.value = '';
  prevLen = 0;
  // IME 늦은 커밋 방어: 50ms간 input 이벤트에서 재클리어
  pendingClear = true;
  setTimeout(() => { pendingClear = false; }, 50);
  if (!keepFocus) hiddenInput.blur();
}

function resetOverlay() {
  overlay.style.top = '';
  overlay.style.height = '';
  overlay.style.bottom = '';
  overlay.style.justifyContent = '';
  overlay.style.paddingTop = '';
}

/* ── Keyboard position sync (mobile) ── */
if (window.visualViewport) {
  const syncOverlay = () => {
    if (!isComposing) return;
    const vvH = window.visualViewport.height;
    const vvTop = window.visualViewport.offsetTop;
    const kbH = window.innerHeight - vvH;
    overlay.style.top = vvTop + 'px';
    overlay.style.height = vvH + 'px';
    overlay.style.bottom = 'auto';
    if (kbH > 100) {
      overlay.style.justifyContent = 'flex-start';
      overlay.style.paddingTop = Math.round(vvH * 0.3) + 'px';
    } else {
      overlay.style.justifyContent = 'center';
      overlay.style.paddingTop = '';
    }
  };
  window.visualViewport.addEventListener('resize', syncOverlay);
  window.visualViewport.addEventListener('scroll', syncOverlay);
}

/* ── Compose mode ── */
function enterCompose() {
  if (isComposing) return;
  isComposing = true;
  hiddenInput.value = '';
  prevLen = 0;
  typingDisplay.innerHTML = '<span class="cursor"></span>';
  typingDisplay.style.cssText = '';
  sentToast.classList.remove('show', 'exit');
  sentToast.innerHTML = '';
  document.body.classList.add('compose');
}

function exitCompose() {
  isComposing = false;
  hiddenInput.blur();
  document.body.classList.remove('compose');
  setTimeout(() => {
    resetOverlay();
    typingDisplay.style.cssText = '';
    typingDisplay.innerHTML = '<span class="cursor"></span>';
    sentToast.classList.remove('show', 'exit');
    sentToast.innerHTML = '';
    hiddenInput.value = '';
    prevLen = 0;
  }, 700);
}

// label[for="hiddenInput"]이 탭하면 input에 focus → compose 진입
hiddenInput.addEventListener('focus', () => { if (!isComposing) enterCompose(); });
cancelBtn.addEventListener('click', exitCompose);

// compose overlay 탭 → 키보드 재오픈
overlay.addEventListener('click', () => { if (isComposing) hiddenInput.focus(); });

/* ── Typing display (입력 미러링) ── */
let pendingClear = false; // 클리어 직후 IME 늦은 커밋 방어 플래그

hiddenInput.addEventListener('input', () => {
  // 클리어 직후 IME가 늦게 커밋한 텍스트 → 즉시 재클리어
  if (pendingClear) {
    hiddenInput.value = '';
    prevLen = 0;
    typingDisplay.innerHTML = '<span class="cursor"></span>';
    return;
  }
  const text = hiddenInput.value;
  const newLen = text.length;
  let html = '';
  for (let i = 0; i < text.length; i++) {
    const ch = text[i] === ' ' ? '&nbsp;' : text[i].replace(/</g, '&lt;');
    const pulse = (i >= prevLen && newLen > prevLen) ? ' style="animation:type-pulse .6s ease forwards"' : '';
    html += `<span class="char"${pulse}>${ch}</span>`;
  }
  html += '<span class="cursor"></span>';
  typingDisplay.innerHTML = html;
  prevLen = newLen;
});

/* ══════════════════════════════════════
   전송 이벤트 — 4단계 안전장치
   ══════════════════════════════════════ */
function trySend() {
  if (sendLock) return;
  sendLock = true;
  setTimeout(() => { sendLock = false; }, 300);
  // setTimeout(0): compositionend + input 이벤트가 완료된 뒤 실행
  // → 브라우저가 조합 텍스트를 커밋한 후에 클리어하므로 "발" 잔류 방지
  setTimeout(() => send(), 0);
}

// 1) form submit — enterkeyhint="send" 가 가장 확실하게 트리거
document.getElementById('sendForm').addEventListener('submit', (e) => {
  e.preventDefault();
  trySend();
});

// 2) keydown Enter 백업
hiddenInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); trySend(); }
});

// 3) beforeinput 백업 (일부 모바일 브라우저)
hiddenInput.addEventListener('beforeinput', (e) => {
  if (e.inputType === 'insertLineBreak' || e.inputType === 'insertParagraph') {
    e.preventDefault(); trySend();
  }
});

// 4) iOS 한글 IME: Enter가 조합만 끝내고 키보드 내리는 경우
//    compositionend 직후 blur → 전송 의도로 간주
hiddenInput.addEventListener('compositionstart', () => { compositionJustEnded = false; });
hiddenInput.addEventListener('compositionend', () => {
  compositionJustEnded = true;
  setTimeout(() => { compositionJustEnded = false; }, 500);
});
hiddenInput.addEventListener('blur', () => {
  if (!compositionJustEnded || !isComposing || !hiddenInput.value.trim() || sendLock) return;
  compositionJustEnded = false;
  // 200ms 뒤에도 blur 상태면 (overlay 탭으로 refocus 안 된 경우) 전송
  setTimeout(() => {
    if (isComposing && document.activeElement !== hiddenInput && hiddenInput.value.trim() && !sendLock) {
      trySend();
    }
  }, 200);
});

/* ══════════════════════════════════════
   필터링
   ══════════════════════════════════════ */
const BLOCKED_WORDS = [
  // 욕설 + 변형
  '씨발','시발','씨빨','씨팔','시팔','씨바','시바','씹','ㅅㅂ','ㅆㅂ',

  '미친놈','미친년','년','놈','애미','애비','엠창',

  '강간','성폭행','성추행','몰카',
  'porn','hentai','nsfw',
];

const SOLO_ALLOWED = [
  '안녕','안녕하세요','반가워','반갑습니다','하이','하이루','헬로','hello','hi','hey',
  '고마워','고맙습니다','감사','감사합니다','감사해요','땡큐','thanks','thank',
  '네','응','예','넵','넹','ㅇㅇ','ㅇㅋ','오케이','ok','okay',
  '뭐해','뭐해요','뭐하세요',
];

function checkBlocked(text) {
  const lower = text.toLowerCase().replace(/\s/g, '');
  if (BLOCKED_WORDS.some(w => lower.includes(w))) return 'profanity';
  const trimmed = text.trim().toLowerCase();
  if (!trimmed.includes(' ') && trimmed.length <= 10 && !SOLO_ALLOWED.some(w => trimmed === w)) return 'single';
  return null;
}

   차단 토스트 (키보드 유지, 인라인 표시)

function showBlockedToast(msg) {
  clearInput(true); // value만 클리어, 키보드 유지

  const span = document.createElement('span');
  span.style.cssText = 'color:rgba(34,34,34,.4);font-size:clamp(14px,4vw,17px);font-weight:600;letter-spacing:-.02em;line-height:1.4;opacity:0;transition:opacity .5s ease;display:inline-block';
  span.innerHTML = msg;
  typingDisplay.innerHTML = '';
  typingDisplay.appendChild(span);
  // 페이드인
  requestAnimationFrame(() => requestAnimationFrame(() => { span.style.opacity = '1'; }));
  // 2초 유지 → 페이드아웃 → 커서 복귀 + 키보드 유지
  setTimeout(() => {
    span.style.opacity = '0';
    setTimeout(() => {
      typingDisplay.innerHTML = '<span class="cursor"></span>';
      hiddenInput.focus();
    }, 500);
  }, 2000);
}

   성공 토스트 (키보드 닫고 전체 오버레이)
   ══════════════════════════════════════ */
function showSuccessToast() {
  isComposing = false;
  clearInput(false); // blur + 클리어
  resetOverlay();
  overlay.style.justifyContent = 'center';

  // 타이핑 디스플레이 페이드아웃
  typingDisplay.style.transition = 'opacity .5s ease,transform .5s ease,filter .5s ease';
  typingDisplay.style.opacity = '0';
  typingDisplay.style.transform = 'translateY(-24px)';
  typingDisplay.style.filter = 'blur(8px)';

  setTimeout(() => {
    typingDisplay.style.display = 'none';
    sentToast.innerHTML = '<div class="toast-main">전송되었어요<div class="toast-glow">전송되었어요</div></div><div class="toast-sub">질문이 많을 시 답변이 늦어질 수도 있어요.<br>부적절한 질문은 답변할 수 없어요.</div>';
    sentToast.classList.add('show');
  }, 500);

  // 3.5초 뒤 퇴장 → 홈으로 복귀
  setTimeout(() => {
    sentToast.classList.add('exit');
    setTimeout(() => {
      document.body.classList.remove('compose');
      setTimeout(() => {
        typingDisplay.style.cssText = '';
        typingDisplay.style.display = '';
        typingDisplay.innerHTML = '<span class="cursor"></span>';
        sentToast.classList.remove('show', 'exit');
        sentToast.innerHTML = '';
        hiddenInput.value = '';
        prevLen = 0;
      }, 700);
    }, 800);
  }, 3500);
}

/* ══════════════════════════════════════
   Send
   ══════════════════════════════════════ */
async function send() {
  const text = hiddenInput.value.trim();
  if (!text) return;

  // 필터
  const blocked = checkBlocked(text);
  if (blocked) {
    showBlockedToast(
      blocked === 'profanity'
        ? '부적절한 질문은<br>답변할 수 없어요'
        : '질문에만 답변할 수 있어요'
    );
    return;
  }

  // Firebase 전송
  try { await qRef.push({ text, ts: Date.now() }); }
  catch(e) { console.error('Firebase send error:', e); }

  showSuccessToast();
}

const orbU = {
  uTime:{value:0}, uStartup:{value:0}, uSpin:{value:0}, uOrbGrow:{value:1.0},
  uColor1:{value:new THREE.Color(0xFF5C00)}, uColor2:{value:new THREE.Color(0xFF8EFF)},

};

});

mat.onBeforeCompile = sh => {
  Object.entries(orbU).forEach(([k,v])=>sh.uniforms[k]=v);
  sh.vertexShader = 'varying vec3 vWP;\n'+sh.vertexShader;

{

    const p = (t - midT) / (1.0 - midT);
