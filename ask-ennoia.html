  .sent-toast{width:85%;min-height:80px;opacity:0;pointer-events:none;z-index:100;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .8s ease,filter .8s ease,transform .8s ease;filter:blur(8px);transform:translateY(24px)}

  .sent-toast .toast-main{position:relative;font-size:30px;font-weight:600;line-height:1.5;letter-spacing:-.04em;white-space:pre-line;color:rgba(34,34,34,.85)}
  .sent-toast .toast-glow{position:absolute;top:0;left:0;width:100%;white-space:pre-line;text-align:center;color:transparent;-webkit-text-fill-color:transparent;background-image:conic-gradient(from 0deg at 50% 50%,#FF5C00,#FF8EFF,#00ADFF,#8364FF,#FF5C00);background-size:150% 150%;-webkit-background-clip:text;background-clip:text;animation:gflow 8s linear infinite;-webkit-mask-image:radial-gradient(ellipse 75% 75% at 50% 50%,transparent 0%,transparent 40%,#000 70%);mask-image:radial-gradient(ellipse 75% 75% at 50% 50%,transparent 0%,transparent 40%,#000 70%);opacity:.45;pointer-events:none}

</style>

/* ── Keyboard handling (mobile) ── */
if (window.visualViewport) {
  const overlay = document.querySelector('.compose-overlay');
  window.visualViewport.addEventListener('resize', () => {
    if (!isComposing) return;
    const vvH = window.visualViewport.height;
    const fullH = window.innerHeight;
    const kbH = fullH - vvH;
    if (kbH > 100) {
      overlay.style.height = vvH + 'px';
      composeControls.style.bottom = kbH + 'px';
    } else {
      overlay.style.height = '';
      composeControls.style.bottom = '0';
    }
  });
}

/* ── Compose mode ── */
function enterCompose() {
  isComposing = true;
  document.body.classList.add('compose');
  hiddenInput.value = '';
  prevLen = 0;
  typingDisplay.innerHTML = '<span class="cursor"></span>';
  typingDisplay.style.cssText = '';
  sentToast.classList.remove('show','exit');
  sentToast.innerHTML = '';
  submitBtn.disabled = true;
  composeControls.style.cssText = '';
  setTimeout(() => hiddenInput.focus(), 500);
}
function exitCompose() {
  isComposing = false;
  hiddenInput.blur();
  document.body.classList.remove('compose');
  // Reset after overlay transition
  setTimeout(() => {
    typingDisplay.style.cssText = '';
    typingDisplay.innerHTML = '<span class="cursor"></span>';
    sentToast.classList.remove('show','exit');
    sentToast.innerHTML = '';
    hiddenInput.value = '';
    prevLen = 0;
    submitBtn.disabled = true;
    composeControls.style.cssText = '';
  }, 700);
}

ctaBtn.addEventListener('click', enterCompose);
cancelBtn.addEventListener('click', exitCompose);

/* ── Typing display ── */
hiddenInput.addEventListener('input', () => {
  const text = hiddenInput.value;
  const newLen = text.length;
  let html = '';
  for (let i = 0; i < text.length; i++) {
    const ch = text[i] === '\n' ? '<br>' : (text[i] === ' ' ? ' ' : text[i].replace(/</g,'&lt;'));
    const pulse = (i >= prevLen && newLen > prevLen) ? ' style="animation:type-pulse .6s ease forwards"' : '';
    html += `<span class="char"${pulse}>${ch}</span>`;
  }
  html += '<span class="cursor"></span>';
  typingDisplay.innerHTML = html;
  prevLen = newLen;
  submitBtn.disabled = !text.trim();
});

hiddenInput.addEventListener('blur', () => {
  if (isComposing) setTimeout(() => hiddenInput.focus(), 50);
});
hiddenInput.addEventListener('compositionstart', () => { isIME = true; });
hiddenInput.addEventListener('compositionend', () => { isIME = false; });
hiddenInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && !isIME) { e.preventDefault(); send(); }
});

/* ── Toast system ── */
function showToast(main, sub, duration, cb) {
  typingDisplay.style.transition = 'opacity .5s ease,transform .5s ease,filter .5s ease';
  typingDisplay.style.opacity = '0';
  typingDisplay.style.transform = 'translateY(-24px)';
  typingDisplay.style.filter = 'blur(8px)';
  composeControls.style.transition = 'opacity .5s ease';
  composeControls.style.opacity = '0';
  composeControls.style.pointerEvents = 'none';
  setTimeout(() => {
    typingDisplay.style.display = 'none';
    sentToast.innerHTML = `<div class="toast-main">${main}<div class="toast-glow">${main}</div></div>${sub ? `<div class="toast-sub">${sub}</div>` : ''}`;
    sentToast.classList.add('show');
  }, 500);
  setTimeout(() => cb(), 500 + duration);
}

function toastThenRestore() {
  sentToast.classList.add('exit');
  setTimeout(() => {
    isComposing = true;
    sentToast.classList.remove('show','exit');
    sentToast.innerHTML = '';
    typingDisplay.style.cssText = '';
    typingDisplay.innerHTML = '<span class="cursor"></span>';

}

function toChosung(text) {
  let r = '';
  for (const c of text) {
    const code = c.charCodeAt(0);
    if (code >= 0xAC00 && code < 0xD7A4) r += CHO[Math.floor((code - 0xAC00) / 588)];
    else if (code >= 0x3131 && code <= 0x314E) r += c;
    else r += c;
  }
  return r;
}

function isJamoOnly(text) {
  // 공백 제거 후 전체가 자음(ㄱ-ㅎ) 또는 모음(ㅏ-ㅣ)으로만 구성
  const stripped = text.replace(/\s/g, '');
  if (!stripped) return false;
  for (const c of stripped) {
    const code = c.charCodeAt(0);
    if (code < 0x3131 || code > 0x3163) return false; // ㄱ(0x3131) ~ ㅣ(0x3163) 범위 밖이면 일반 글자
  }
  return true;
}

function containsBlocked(text) {
  const lower = text.toLowerCase().replace(/\s/g,'');
  if (BLOCKED_WORDS.some(w => lower.includes(w.toLowerCase()))) return true;
  const cho = toChosung(text.replace(/\s/g,''));
  if (BLOCKED_CHO.some(p => cho.includes(p))) return true;
  return false;
}

  isComposing = false;

  try { await qRef.push({ text, ts: Date.now() }); }
  catch(e) { console.error('Firebase send error:', e); }
  showToast('전송되었어요', '질문이 많을 시 답변이 늦어질 수도 있어요.<br>부적절한 질문은 답변할 수 없어요.', 3000, () => {
